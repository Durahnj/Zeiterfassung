<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Stunden-Pro | Porterhouse Cloud</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-font: 'Inter', sans-serif;
      --title-font: 'Outfit', sans-serif;
      --bg-color: #fafafa;
      --card-bg: #ffffff;
      --accent: #800020; /* Bordeaux Rot */
      --accent-hover: #600018;
      --text-main: #1a1a1a;
      --text-muted: #666666;
      --border-color: #e5e5e5;
      --danger: #dc2626;
      --success: #16a34a;
      --card-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 15px; min-height: 100vh;
      font-family: var(--primary-font);
      background: var(--bg-color);
      color: var(--text-main);
      display: flex; justify-content: center; align-items: center;
    }

    .container {
      width: 100%; max-width: 1100px;
      background: var(--card-bg);
      border-radius: 24px; padding: 30px;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-color);
    }

    h1 { 
      font-family: var(--title-font); 
      text-align: center; 
      margin: 0; 
      color: var(--accent); 
      font-size: clamp(24px, 6vw, 32px); 
      letter-spacing: -0.5px;
    }
    
    .subtitle { 
      text-align: center; 
      margin-bottom: 30px; 
      color: var(--text-muted); 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      font-weight: 600;
    }

    .layout { display: grid; grid-template-columns: 1fr; gap: 24px; }

    .sidebar, .history-panel, .booking-section { 
      background: var(--card-bg); 
      border-radius: 20px; 
      padding: 25px; 
      border: 1px solid var(--border-color);
    }

    h3 { 
      font-family: var(--title-font); 
      margin-top: 0; 
      color: var(--text-main); 
      font-size: 18px; 
      font-weight: 600;
      margin-bottom: 20px;
    }

    label { 
      display: block; 
      margin-bottom: 6px; 
      color: var(--text-muted); 
      font-weight: 600; 
      font-size: 10px; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
    }

    input, select { 
      width: 100%; padding: 12px; border-radius: 12px; 
      border: 1px solid var(--border-color); 
      background: #fdfdfd; font-size: 15px; margin-bottom: 16px;
      font-family: var(--primary-font);
      transition: border-color 0.2s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }

    .select-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px; }
    
    .btn-edit {
      width: 44px; height: 44px; padding: 0; border-radius: 12px;
      background: #fff; border: 1px solid var(--border-color);
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s;
    }
    .btn-edit:hover { background: #f5f5f5; border-color: var(--accent); }

    button { 
      width: 100%; padding: 14px; border: none; border-radius: 12px; 
      background: var(--accent); color: white; 
      font-weight: 600; cursor: pointer; transition: 0.3s;
      font-family: var(--title-font);
      font-size: 15px;
    }
    button:hover { background: var(--accent-hover); transform: translateY(-1px); }

    .btn-secondary { background: #f5f5f5; color: #444; border: 1px solid var(--border-color); margin-bottom: 8px; padding: 10px; font-size: 12px; }
    .btn-excel { background: var(--success); margin-bottom: 8px; padding: 10px; font-size: 12px; }
    .btn-danger { background: #fff1f2; color: var(--danger); border: 1px solid #fecaca; margin-top: 10px; }

    .saldo-box { 
      margin: 20px 0; 
      background: #fdf2f4; /* Ganz leichter Bordeaux-Schimmer */
      border-radius: 16px; padding: 20px; 
      text-align: center; border: 1px solid rgba(128,0,32,0.1); 
    }
    .saldo-value { font-size: 32px; font-weight: 700; color: var(--accent); font-family: var(--title-font); letter-spacing: -1px; }
    .start-saldo-info { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

    .history-list { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; margin: 0; }
    .history-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 14px 0; border-bottom: 1px solid var(--border-color); 
    }

    .tags-container { display: flex; gap: 4px; margin-top: 4px; }
    .tag { font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: 700; display: flex; align-items: center; gap: 3px; }
    .tag-u { background: #dcfce7; color: #166534; }
    .tag-k { background: #fee2e2; color: #991b1b; }

    .diff-pos { color: var(--success); font-weight: 700; font-size: 0.85em; margin-left: 4px; }
    .diff-neg { color: var(--danger); font-weight: 700; font-size: 0.85em; margin-left: 4px; }
    .payout-val { color: var(--text-muted); font-style: italic; font-size: 10px; display: block; margin-top: 2px; }
    .time-val { font-family: var(--primary-font); font-weight: 600; color: var(--text-main); font-size: 14px; text-align: right; }

    .delete-entry-small { 
      background: #fee2e2 !important; color: #ef4444 !important; border: none !important; 
      width: 26px !important; height: 26px !important; border-radius: 7px !important; 
      cursor: pointer; font-size: 12px; display: flex !important; align-items: center; justify-content: center;
      transition: 0.2s; margin-left: 10px; padding: 0 !important;
    }

    @media (min-width: 1001px) { .layout { grid-template-columns: 280px 1fr 360px; } }

    @media (prefers-color-scheme: dark) {
      :root { 
        --bg-color: #0f0a0a; /* Sehr dunkles Bordeaux-Schwarz */
        --card-bg: #1a1212; 
        --text-main: #f9f9f9; 
        --text-muted: #a1a1a1; 
        --border-color: #2d1f1f; 
        --accent: #b32d3a; /* Helleres Bordeaux für Kontrast */
        --accent-hover: #d43d4c;
      }
      .sidebar, .history-panel, .booking-section { background: #1a1212; border-color: #2d1f1f; }
      input, select { background: #241a1a; color: #fff; border-color: #3d2a2a; }
      .btn-edit { background: #241a1a; border-color: #3d2a2a; color: #fff; }
      .saldo-box { background: #241618; border-color: rgba(179,45,58,0.2); }
      .history-item { border-bottom-color: #2d1f1f; }
      .tag-u { background: #064e3b; color: #6ee7b7; }
      .tag-k { background: #7f1d1d; color: #fca5a5; }
      .btn-secondary { background: #241a1a; color: #ccc; border-color: #3d2a2a; }
      .delete-entry-small { background: #450a0a !important; color: #f87171 !important; }
    }

    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); display: flex; flex-direction: column; justify-content: center;
      align-items: center; z-index: 9999; font-weight: bold; color: var(--accent);
      font-family: var(--title-font);
    }
    
    /* Scrollbar Styling */
    .history-list::-webkit-scrollbar { width: 5px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
  </style>
</head>
<body>

  <div id="loadingOverlay">
    <div style="font-size: 32px; margin-bottom: 15px;">🍷</div>
    <div style="letter-spacing: 1px;">PORT HOUSE CLOUD...</div>
  </div>

  <div class="container">
    <h1>Stundenaufzeichnung</h1>
    <div class="subtitle">Personalverwaltung Porterhouse</div>

    <div class="layout">
      <div class="sidebar">
        <h3>Mitarbeiter</h3>
        <div class="select-row">
          <select id="mitarbeiterSelect" onchange="mitarbeiterWechseln()"></select>
          <button id="editMitarbeiterBtn" class="btn-edit" onclick="mitarbeiterBearbeitenModus()" title="Bearbeiten">✏️</button>
        </div>
        
        <div id="neuerMitarbeiterBereich" style="display:none; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 12px; border: 1px dashed var(--border-color); margin-bottom: 20px;">
          <label id="bereichTitel" style="color:var(--accent)">Neuer Mitarbeiter</label>
          <input type="text" id="neuerMitarbeiter" placeholder="Name">
          <label>Start-Saldo (HH:MM)</label>
          <input type="text" id="startSaldo" placeholder="00:00">
          <button id="btnAbbrechen" class="btn-secondary" style="margin-top:5px; border-color:#dc2626; color:#dc2626; display:none;" onclick="bearbeitenAbbrechen()">Abbrechen</button>
        </div>

        <div class="saldo-box">
          <div style="font-size:10px; color:var(--text-muted); text-transform: uppercase; font-weight: 700;">Aktueller Saldo</div>
          <div class="saldo-value" id="aktuellerSaldo">00:00</div>
          <div class="start-saldo-info">Start: <span id="startSaldoDisplay">00:00</span></div>
        </div>

        <button class="btn-excel" onclick="exportToExcel()">📊 Excel Export</button>
        <button class="btn-secondary" onclick="exportBackup()">📥 Backup</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📤 Import</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importBackup(this)">
        <button id="deleteBtn" class="btn-danger" onclick="mitarbeiterLoeschen()" style="display:none;">Mitarbeiter löschen</button>
      </div>

      <div class="booking-section">
        <h3 id="buchungSektionTitel">Buchung erfassen</h3>
        <div class="row">
          <div>
            <label>MM/JJ</label>
            <input type="text" id="buchungsDatum" placeholder="04/26">
          </div>
          <div>
            <label>Soll-Stunden</label>
            <input type="text" id="soll" placeholder="160:00">
          </div>
        </div>
        
        <div class="row">
          <div>
            <label>Ist (Geleistet)</label>
            <input type="text" id="ist" placeholder="168:00">
          </div>
          <div>
            <label>Auszahlung</label>
            <input type="text" id="auszahlung" placeholder="00:00">
          </div>
        </div>

        <div class="row" style="background: rgba(0,0,0,0.01); padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 18px;">
          <div>
            <label>Urlaub (Tage)</label>
            <input type="number" id="urlaub" placeholder="0" min="0" step="0.5">
          </div>
          <div>
            <label>Krank (Tage)</label>
            <input type="number" id="krank" placeholder="0" min="0" step="0.5">
          </div>
        </div>
        
        <button id="btnSpeichern" onclick="berechnen()">💾 Buchung speichern</button>
        <div id="ergebnis" style="text-align:center; margin-top:12px; font-weight:600; color:var(--accent); font-size:13px;"></div>
      </div>

      <div class="history-panel">
        <h3>Verlauf</h3>
        <div class="row">
          <div style="flex:1">
            <label>Jahr filtern</label>
            <select id="jahrFilter" onchange="updateVerlaufAnzeige()"></select>
          </div>
        </div>
        <ul id="historyList" class="history-list"></ul>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAPF3obb17GU4zgrsOQFq6BCuQCMp2m6V4",
      authDomain: "stundenph.firebaseapp.com",
      projectId: "stundenph",
      storageBucket: "stundenph.firebasestorage.app",
      messagingSenderId: "836285555835",
      appId: "1:836285555835:web:612e642c22b74d24fbaede",
      measurementId: "G-00XQN5PV76"
    };

    const monatsNamen = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let mitarbeiter = {}, sollStundenSpeicher = {}, verlaufDetails = {}, startSalden = {};
    let istBearbeitungsModus = false, alterNameFuerBearbeitung = "";

    async function datenLaden() {
      try {
        const doc = await db.collection("porterhouse").doc("stundendaten").get();
        if (doc.exists) {
          const d = doc.data();
          mitarbeiter = d.mitarbeiter || {};
          sollStundenSpeicher = d.sollStundenSpeicher || {};
          verlaufDetails = d.verlaufDetails || {};
          startSalden = d.startSalden || {};
        }
        document.getElementById("loadingOverlay").style.display = "none";
        initApp();
      } catch (err) { console.error(err); alert("Fehler beim Laden!"); }
    }

    async function speichern() {
      try {
        await db.collection("porterhouse").doc("stundendaten").set({
          mitarbeiter, sollStundenSpeicher, verlaufDetails, startSalden, lastChange: new Date().toISOString()
        });
      } catch (err) { alert("Cloud-Fehler!"); }
    }

    function initApp() {
      const d = new Date(); d.setMonth(d.getMonth() - 1);
      document.getElementById("buchungsDatum").value = String(d.getMonth() + 1).padStart(2, '0') + "/" + String(d.getFullYear()).substring(2);
      dropdownLaden(); jahrFilterAktualisieren();
    }

    function zeitZuMinuten(zeit) {
      if (!zeit || zeit === "0") return 0;
      let neg = zeit.toString().startsWith("-");
      let clean = neg ? zeit.substring(1) : zeit;
      let t = clean.split(":");
      if (t.length !== 2) return 0;
      return (neg ? -1 : 1) * (parseInt(t[0]) * 60 + parseInt(t[1]));
    }

    function minutenZuZeit(min) {
      let neg = min < 0; let m = Math.abs(min);
      return (neg ? "-" : "") + String(Math.floor(m / 60)).padStart(2, "0") + ":" + String(m % 60).padStart(2, "0");
    }

    function jahrFilterAktualisieren() {
      const s = document.getElementById("jahrFilter");
      const prev = s.value;
      const jahre = new Set([new Date().getFullYear()]);
      Object.values(verlaufDetails).forEach(m => Object.keys(m).forEach(j => jahre.add(parseInt(j))));
      s.innerHTML = Array.from(jahre).sort((a,b)=>b-a).map(j => `<option value="${j}">${j}</option>`).join("");
      if(prev) s.value = prev;
    }

    function dropdownLaden() {
      const s = document.getElementById("mitarbeiterSelect");
      const cur = s.value;
      s.innerHTML = '<option value="neu">+ Mitarbeiter anlegen</option>' + 
        Object.keys(mitarbeiter).sort().map(n => `<option value="${n}">${n}</option>`).join("");
      if(cur && mitarbeiter[cur]) s.value = cur;
      mitarbeiterWechseln();
    }

    function mitarbeiterWechseln() {
      const name = document.getElementById("mitarbeiterSelect").value;
      const isNew = name === "neu";
      if (!istBearbeitungsModus) {
        document.getElementById("neuerMitarbeiterBereich").style.display = isNew ? "block" : "none";
        document.getElementById("editMitarbeiterBtn").style.display = isNew ? "none" : "block";
        document.getElementById("deleteBtn").style.display = isNew ? "none" : "block";
      }
      document.getElementById("aktuellerSaldo").textContent = isNew ? "00:00" : minutenZuZeit(mitarbeiter[name] || 0);
      document.getElementById("startSaldoDisplay").textContent = isNew ? "00:00" : minutenZuZeit(startSalden[name] || 0);
      if(!isNew) document.getElementById("soll").value = sollStundenSpeicher[name] || "";
      updateVerlaufAnzeige();
    }

    function mitarbeiterBearbeitenModus() {
      const n = document.getElementById("mitarbeiterSelect").value;
      if (n === "neu") return;
      istBearbeitungsModus = true; alterNameFuerBearbeitung = n;
      document.getElementById("bereichTitel").textContent = "Mitarbeiter bearbeiten";
      document.getElementById("neuerMitarbeiter").value = n;
      document.getElementById("startSaldo").value = minutenZuZeit(startSalden[n] || 0);
      document.getElementById("neuerMitarbeiterBereich").style.display = "block";
      document.getElementById("btnAbbrechen").style.display = "block";
      document.getElementById("btnSpeichern").textContent = "📝 Stammdaten speichern";
    }

    function bearbeitenAbbrechen() {
      istBearbeitungsModus = false;
      document.getElementById("neuerMitarbeiterBereich").style.display = "none";
      document.getElementById("btnAbbrechen").style.display = "none";
      document.getElementById("btnSpeichern").textContent = "💾 Buchung speichern";
      mitarbeiterWechseln();
    }

    function updateVerlaufAnzeige() {
      const n = document.getElementById("mitarbeiterSelect").value;
      const j = document.getElementById("jahrFilter").value;
      const l = document.getElementById("historyList");
      l.innerHTML = "";
      if (n === "neu" || !verlaufDetails[n]?.[j]) return;
      
      monatsNamen.forEach((mName, idx) => {
        const mKey = String(idx + 1).padStart(2, '0');
        const d = verlaufDetails[n][j][mKey];
        if (d) {
          const diff = zeitZuMinuten(d.ist) - zeitZuMinuten(d.soll);
          const li = document.createElement("li");
          li.className = "history-item";
          li.innerHTML = `
            <div style="flex-grow:1;">
              <span style="font-weight:600;">${mName}</span>
              <div class="tags-container">
                ${d.urlaub > 0 ? `<span class="tag tag-u">🏖️ ${d.urlaub}</span>` : ''}
                ${d.krank > 0 ? `<span class="tag tag-k">🤒 ${d.krank}</span>` : ''}
              </div>
              ${zeitZuMinuten(d.auszahlung) !== 0 ? `<span class="payout-val">Auszahlung: ${d.auszahlung}h</span>` : ''}
            </div>
            <div style="display:flex; align-items:center;">
              <div class="time-val">${d.ist} <span class="${diff >= 0 ? 'diff-pos' : 'diff-neg'}">(${diff >= 0 ? '+' : ''}${minutenZuZeit(diff)})</span></div>
              <button class="delete-entry-small" onclick="monatLoeschen('${n}', '${j}', '${mKey}')">✕</button>
            </div>`;
          l.appendChild(li);
        }
      });
    }

    async function berechnen() {
      const sel = document.getElementById("mitarbeiterSelect");
      if (istBearbeitungsModus) {
        let nName = document.getElementById("neuerMitarbeiter").value.trim();
        let nStart = zeitZuMinuten(document.getElementById("startSaldo").value || "00:00");
        if (nName !== alterNameFuerBearbeitung) {
          mitarbeiter[nName] = mitarbeiter[alterNameFuerBearbeitung];
          startSalden[nName] = nStart;
          sollStundenSpeicher[nName] = sollStundenSpeicher[alterNameFuerBearbeitung];
          verlaufDetails[nName] = verlaufDetails[alterNameFuerBearbeitung] || {};
          delete mitarbeiter[alterNameFuerBearbeitung]; delete startSalden[alterNameFuerBearbeitung];
          delete sollStundenSpeicher[alterNameFuerBearbeitung]; delete verlaufDetails[alterNameFuerBearbeitung];
        } else { startSalden[nName] = nStart; }
        
        let s = startSalden[nName] || 0;
        Object.values(verlaufDetails[nName] || {}).forEach(y => Object.values(y).forEach(m => {
          s += (zeitZuMinuten(m.ist) - zeitZuMinuten(m.soll)) - zeitZuMinuten(m.auszahlung || "00:00");
        }));
        mitarbeiter[nName] = s;
        await speichern(); bearbeitenAbbrechen(); dropdownLaden();
        document.getElementById("mitarbeiterSelect").value = nName; mitarbeiterWechseln();
        return;
      }

      let name = sel.value === "neu" ? document.getElementById("neuerMitarbeiter").value.trim() : sel.value;
      if(!name) return alert("Name angeben!");
      const dVal = document.getElementById("buchungsDatum").value;
      const dp = dVal.split("/"); if (dp.length !== 2) return alert("MM/JJ!");
      const mK = dp[0], jK = "20" + dp[1];
      if (verlaufDetails[name]?.[jK]?.[mK]) return alert("Existiert bereits!");
      
      const istV = document.getElementById("ist").value || "00:00", sollV = document.getElementById("soll").value || "00:00", ausV = document.getElementById("auszahlung").value || "00:00";
      const urlT = parseFloat(document.getElementById("urlaub").value) || 0, krkT = parseFloat(document.getElementById("krank").value) || 0;

      if (sel.value === "neu") {
        let sM = zeitZuMinuten(document.getElementById("startSaldo").value || "00:00");
        mitarbeiter[name] = sM; startSalden[name] = sM;
      }
      mitarbeiter[name] += (zeitZuMinuten(istV) - zeitZuMinuten(sollV)) - zeitZuMinuten(ausV);
      sollStundenSpeicher[name] = sollV;
      if (!verlaufDetails[name]) verlaufDetails[name] = {};
      if (!verlaufDetails[name][jK]) verlaufDetails[name][jK] = {};
      verlaufDetails[name][jK][mK] = { ist: istV, soll: sollV, auszahlung: ausV, urlaub: urlT, krank: krkT };
      
      await speichern(); jahrFilterAktualisieren(); dropdownLaden();
      document.getElementById("mitarbeiterSelect").value = name; mitarbeiterWechseln();
      
      document.getElementById("ist").value = ""; 
      document.getElementById("auszahlung").value = "";
      document.getElementById("urlaub").value = ""; 
      document.getElementById("krank").value = "";
    }

    async function monatLoeschen(n, j, m) {
      if (!confirm("Löschen?")) return;
      const d = verlaufDetails[n][j][m];
      mitarbeiter[n] -= (zeitZuMinuten(d.ist) - zeitZuMinuten(d.soll) - zeitZuMinuten(d.auszahlung || "00:00"));
      delete verlaufDetails[n][j][m];
      await speichern(); mitarbeiterWechseln();
    }

    async function mitarbeiterLoeschen() {
      const n = document.getElementById("mitarbeiterSelect").value;
      if (confirm(`"${n}" unwiderruflich löschen?`)) {
        delete mitarbeiter[n]; delete sollStundenSpeicher[n]; delete verlaufDetails[n]; delete startSalden[n];
        await speichern(); location.reload();
      }
    }

    function exportToExcel() {
      const j = document.getElementById("jahrFilter").value;
      let csv = "\ufeffName;Saldo;Urlaub;Krank;";
      monatsNamen.forEach(mName => { csv += mName + ";"; });
      csv += "\r\n";
      Object.keys(mitarbeiter).sort().forEach(n => {
        let uSum = 0, kSum = 0;
        if(verlaufDetails[n]?.[j]) {
          Object.values(verlaufDetails[n][j]).forEach(m => { uSum += m.urlaub||0; kSum += m.krank||0; });
        }
        csv += `${n};${minutenZuZeit(mitarbeiter[n])};${uSum};${kSum};`;
        for(let i=1;i<=12;i++) {
          const d = verlaufDetails[n]?.[j]?.[String(i).padStart(2,'0')];
          csv += d ? d.ist+";" : "-;";
        }
        csv += "\r\n";
      });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
      link.download = `Export_${j}.csv`; link.click();
    }

    function exportBackup() {
      const b = new Blob([JSON.stringify({mitarbeiter,sollStundenSpeicher,verlaufDetails,startSalden})], {type:'application/json'});
      const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "Backup_Porterhouse.json"; l.click();
    }

    async function importBackup(i) {
      const r = new FileReader();
      r.onload = async (e) => {
        const d = JSON.parse(e.target.result);
        mitarbeiter=d.mitarbeiter; sollStundenSpeicher=d.sollStundenSpeicher; verlaufDetails=d.verlaufDetails; startSalden=d.startSalden;
        await speichern(); location.reload();
      };
      r.readAsText(i.files[0]);
    }

    window.onload = datenLaden;
  </script>
</body>
</html>
