<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Stunden-Pro | Porterhouse Cloud</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-font: 'Inter', sans-serif;
      --title-font: 'Playfair Display', serif;
      --bg-color: #f8f5f2;
      --card-bg: #ffffff;
      --accent: #8b5a3c;
      --accent-hover: #704a35;
      --text-main: #3d342d;
      --text-muted: #a67c52;
      --border-color: #e2d7cc;
      --danger: #c17373;
      --success: #4a7c44;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 15px; min-height: 100vh;
      font-family: var(--primary-font);
      background: var(--bg-color);
      color: var(--text-main);
      display: flex; justify-content: center; align-items: center;
    }

    .container {
      width: 100%; max-width: 1100px;
      background: var(--card-bg);
      border-radius: 30px; padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid rgba(220,200,170,0.2);
    }

    h1 { font-family: var(--title-font); text-align: center; margin: 0; color: var(--accent); font-size: clamp(26px, 7vw, 36px); }
    .subtitle { text-align: center; margin-bottom: 30px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

    .layout { display: grid; grid-template-columns: 1fr; gap: 20px; }

    .sidebar, .history-panel, .booking-section { 
      background: #ffffff; border-radius: 24px; padding: 25px; 
      border: 1px solid var(--border-color);
    }

    h3 { font-family: var(--title-font); margin-top: 0; color: var(--accent); font-size: 20px; }

    label { display: block; margin-bottom: 8px; color: #704a35; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

    input, select { 
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); 
      background: #fafafa; font-size: 16px; margin-bottom: 15px;
    }

    button { 
      width: 100%; padding: 16px; border: none; border-radius: 14px; 
      background: var(--accent); color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    button:hover { background: var(--accent-hover); transform: translateY(-2px); }

    .btn-secondary { background: #b89968; margin-bottom: 10px; padding: 12px; font-size: 13px; }
    .btn-excel { background: #4a7c44; margin-bottom: 10px; padding: 12px; font-size: 13px; }
    .btn-danger { background: #fdf2f2; color: var(--danger); border: 1px solid #f2dada; margin-top: 10px; }

    .saldo-box { margin: 20px 0; background: #fdfaf7; border-radius: 18px; padding: 18px; text-align: center; border: 1px dashed var(--border-color); }
    .saldo-value { font-size: 28px; font-weight: 600; color: var(--accent); }
    .start-saldo-info { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

    .history-list { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; margin: 0; }
    .history-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 12px 0; border-bottom: 1px solid #f0f0f0; 
    }

    .diff-pos { color: var(--success); font-weight: bold; font-size: 0.8em; margin-left: 4px; }
    .diff-neg { color: var(--danger); font-weight: bold; font-size: 0.8em; margin-left: 4px; }
    .payout-val { color: var(--text-muted); font-style: italic; font-size: 11px; display: block; margin-top: 2px; }
    .time-val { font-family: 'Inter', sans-serif; font-weight: 600; color: var(--accent); font-size: 15px; }

    .delete-entry-small { 
      background: #fee2e2; color: #ef4444; border: none; 
      width: 28px; height: 28px; border-radius: 8px; 
      cursor: pointer; font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: 0.2s; margin-left: 12px; padding: 0;
    }
    .delete-entry-small:hover { background: #ef4444; color: white; }

    @media (min-width: 1001px) { .layout { grid-template-columns: 280px 1fr 380px; } }

    @media (prefers-color-scheme: dark) {
      :root { --bg-color: #1a1614; --card-bg: #25211e; --text-main: #f5e6d3; --border-color: #3d342d; }
      .sidebar, .history-panel, .booking-section { background: #25211e; }
      input, select { background: #2d2824; color: #fff; }
      .saldo-box { background: #2d2824; }
      .history-item { border-bottom-color: #333; }
    }

    /* Loading Overlay */
    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center;
      align-items: center; z-index: 9999; font-weight: bold; color: var(--accent);
    }
  </style>
</head>
<body>

  <div id="loadingOverlay">
    <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
    <div>Lade Daten aus Cloud...</div>
  </div>

  <div class="container">
    <h1>Stundenaufzeichnung</h1>
    <div class="subtitle">Personalverwaltung Porterhouse</div>

    <div class="layout">
      <div class="sidebar">
        <h3>Mitarbeiter</h3>
        <select id="mitarbeiterSelect" onchange="mitarbeiterWechseln()"></select>
        
        <div id="neuerMitarbeiterBereich" style="display:none; background: #fdfaf7; padding: 15px; border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 20px;">
          <label>Neuer Name</label>
          <input type="text" id="neuerMitarbeiter" placeholder="Vorname Nachname">
          <label>Start-Saldo (HH:MM)</label>
          <input type="text" id="startSaldo" placeholder="00:00">
        </div>

        <div class="saldo-box">
          <div style="font-size:11px; color:var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Aktueller Saldo</div>
          <div class="saldo-value" id="aktuellerSaldo">00:00</div>
          <div class="start-saldo-info">Start-Saldo: <span id="startSaldoDisplay">00:00</span></div>
        </div>

        <button class="btn-excel" onclick="exportToExcel()">📊 Excel Export (Jahr)</button>
        <button class="btn-secondary" onclick="exportBackup()">📥 JSON Backup</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📤 Backup einspielen</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importBackup(this)">
        <button id="deleteBtn" class="btn-danger" onclick="mitarbeiterLoeschen()" style="display:none;">Mitarbeiter löschen</button>
      </div>

      <div class="booking-section">
        <h3>Buchung erfassen</h3>
        <label>Monat / Jahr (MM/JJ)</label>
        <input type="text" id="buchungsDatum" placeholder="04/26">
        
        <label>Soll-Stunden</label>
        <input type="text" id="soll" placeholder="160:00">
        
        <label>Ist-Stunden (Geleistet)</label>
        <input type="text" id="ist" placeholder="168:45">
        
        <label>Auszahlung (Stunden)</label>
        <input type="text" id="auszahlung" placeholder="00:00">
        
        <button onclick="berechnen()">💾 Saldo aktualisieren</button>
        <div id="ergebnis" style="text-align:center; margin-top:10px; font-weight:600;"></div>
      </div>

      <div class="history-panel">
        <h3>Verlauf</h3>
        <label>Jahr filtern</label>
        <select id="jahrFilter" onchange="updateVerlaufAnzeige()"></select>
        <ul id="historyList" class="history-list"></ul>
      </div>
    </div>
  </div>

  <script>
    // --- FIREBASE INITIALISIERUNG ---
    const firebaseConfig = {
      apiKey: "AIzaSyAPF3obb17GU4zgrsOQFq6BCuQCMp2m6V4",
      authDomain: "stundenph.firebaseapp.com",
      projectId: "stundenph",
      storageBucket: "stundenph.firebasestorage.app",
      messagingSenderId: "836285555835",
      appId: "1:836285555835:web:612e642c22b74d24fbaede",
      measurementId: "G-00XQN5PV76"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Lokale Datenstrukturen
    let mitarbeiter = {};
    let sollStundenSpeicher = {};
    let verlaufDetails = {};
    let startSalden = {};

    // 1. DATEN BEIM START AUS FIREBASE LADEN
    async function datenLaden() {
      try {
        const doc = await db.collection("porterhouse").doc("stundendaten").get();
        if (doc.exists) {
          const d = doc.data();
          mitarbeiter = d.mitarbeiter || {};
          sollStundenSpeicher = d.sollStundenSpeicher || {};
          verlaufDetails = d.verlaufDetails || {};
          startSalden = d.startSalden || {};
        }
        document.getElementById("loadingOverlay").style.display = "none";
        initApp();
      } catch (err) {
        console.error("Fehler beim Laden:", err);
        alert("Fehler beim Laden der Cloud-Daten! Bitte Internetverbindung prüfen.");
      }
    }

    // 2. DATEN IN FIREBASE SPEICHERN
    async function speichern() {
      try {
        await db.collection("porterhouse").doc("stundendaten").set({
          mitarbeiter,
          sollStundenSpeicher,
          verlaufDetails,
          startSalden,
          lastChange: new Date().toISOString()
        });
      } catch (err) {
        console.error("Speicherfehler:", err);
        alert("Fehler beim Speichern in der Cloud!");
      }
    }

    function initApp() {
      const d = new Date(); d.setMonth(d.getMonth() - 1);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const jj = String(d.getFullYear()).substring(2);
      document.getElementById("buchungsDatum").value = `${mm}/${jj}`;
      
      dropdownLaden();
      jahrFilterAktualisieren();
    }

    window.onload = datenLaden;

    // --- HILFSFUNKTIONEN ---

    function jahrFilterAktualisieren() {
      const jahrSelect = document.getElementById("jahrFilter");
      const aktuellesJahr = new Date().getFullYear();
      const vorhandeneJahre = new Set();
      vorhandeneJahre.add(aktuellesJahr);

      Object.values(verlaufDetails).forEach(mitarbeiterJahre => {
        Object.keys(mitarbeiterJahre).forEach(jahr => {
          vorhandeneJahre.add(parseInt(jahr));
        });
      });

      const sortierteJahre = Array.from(vorhandeneJahre).sort((a, b) => b - a);
      const vorherigeAuswahl = jahrSelect.value;
      jahrSelect.innerHTML = "";
      
      sortierteJahre.forEach(jahr => {
        const opt = document.createElement("option");
        opt.value = jahr;
        opt.textContent = jahr;
        jahrSelect.appendChild(opt);
      });

      if (vorherigeAuswahl && sortierteJahre.includes(parseInt(vorherigeAuswahl))) {
        jahrSelect.value = vorherigeAuswahl;
      }
    }

    function zeitZuMinuten(zeit) {
      if (!zeit || zeit.toString().trim() === "" || zeit === "0") return 0;
      let neg = zeit.startsWith("-");
      if (neg) zeit = zeit.substring(1);
      const teile = zeit.split(":");
      if (teile.length !== 2) return 0;
      return (neg ? -1 : 1) * ((parseInt(teile[0], 10) * 60) + parseInt(teile[1], 10));
    }

    function minutenZuZeit(min) {
      const neg = min < 0; min = Math.abs(min);
      const h = Math.floor(min / 60); const m = min % 60;
      return (neg ? "-" : "") + String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
    }

    function dropdownLaden() {
      const select = document.getElementById("mitarbeiterSelect");
      const aktueller = select.value;
      select.innerHTML = '<option value="neu">+ Neuer Mitarbeiter</option>';
      Object.keys(mitarbeiter).sort().forEach(n => {
        const opt = document.createElement("option"); opt.value = n; opt.textContent = n;
        select.appendChild(opt);
      });
      if (aktueller && mitarbeiter[aktueller] !== undefined) select.value = aktueller;
      mitarbeiterWechseln();
    }

    function mitarbeiterWechseln() {
      const select = document.getElementById("mitarbeiterSelect");
      const name = select.value;
      const isNew = name === "neu";
      document.getElementById("neuerMitarbeiterBereich").style.display = isNew ? "block" : "none";
      document.getElementById("deleteBtn").style.display = isNew ? "none" : "block";
      
      if (!isNew) {
        document.getElementById("aktuellerSaldo").textContent = minutenZuZeit(mitarbeiter[name] || 0);
        document.getElementById("soll").value = sollStundenSpeicher[name] || "";
        document.getElementById("startSaldoDisplay").textContent = minutenZuZeit(startSalden[name] || 0);
      } else {
        document.getElementById("aktuellerSaldo").textContent = "00:00";
        document.getElementById("startSaldoDisplay").textContent = "00:00";
      }
      updateVerlaufAnzeige();
    }

    function updateVerlaufAnzeige() {
      const name = document.getElementById("mitarbeiterSelect").value;
      const jahr = document.getElementById("jahrFilter").value;
      const list = document.getElementById("historyList");
      list.innerHTML = "";
      
      if (name === "neu" || !verlaufDetails[name] || !verlaufDetails[name][jahr]) return;

      const monate = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
      
      monate.forEach((mName, index) => {
        const mKey = String(index + 1).padStart(2, '0');
        const details = verlaufDetails[name][jahr][mKey];
        if (details) {
          const diff = zeitZuMinuten(details.ist) - zeitZuMinuten(details.soll);
          const diffText = diff >= 0 ? `(+${minutenZuZeit(diff)})` : `(${minutenZuZeit(diff)})`;
          const li = document.createElement("li");
          li.className = "history-item";
          li.innerHTML = `
            <div style="flex-grow:1;">
              <span style="font-weight:600; font-size:14px;">${mName}</span>
              ${zeitZuMinuten(details.auszahlung) !== 0 ? `<span class="payout-val">Auszahlung: ${details.auszahlung}h</span>` : ''}
            </div>
            <div style="display:flex; align-items:center;">
              <span class="time-val">${details.ist} <span class="${diff >= 0 ? 'diff-pos' : 'diff-neg'}">${diffText}</span></span>
              <button class="delete-entry-small" onclick="monatLoeschen('${name}', '${jahr}', '${mKey}')">✕</button>
            </div>`;
          list.appendChild(li);
        }
      });
    }

    async function berechnen() {
      const select = document.getElementById("mitarbeiterSelect");
      const datumVal = document.getElementById("buchungsDatum").value;
      const istVal = document.getElementById("ist").value || "00:00";
      const sollVal = document.getElementById("soll").value || "00:00";
      const ausVal = document.getElementById("auszahlung").value || "00:00";
      
      let name = select.value === "neu" ? document.getElementById("neuerMitarbeiter").value.trim() : select.value;
      if (!name) return alert("Bitte Name eingeben!");

      const dateParts = datumVal.split("/");
      if (dateParts.length !== 2) return alert("Format: MM/JJ");
      const monatKey = dateParts[0], jahrKey = "20" + dateParts[1];

      if (verlaufDetails[name]?.[jahrKey]?.[monatKey]) return alert("Monat ist bereits gebucht.");

      const sollMin = zeitZuMinuten(sollVal), istMin = zeitZuMinuten(istVal), ausMin = zeitZuMinuten(ausVal);

      if (select.value === "neu") {
        const sMin = zeitZuMinuten(document.getElementById("startSaldo").value || "00:00");
        mitarbeiter[name] = sMin;
        startSalden[name] = sMin;
      }

      mitarbeiter[name] = (mitarbeiter[name] || 0) + (istMin - sollMin) - ausMin;
      sollStundenSpeicher[name] = sollVal;

      if (!verlaufDetails[name]) verlaufDetails[name] = {};
      if (!verlaufDetails[name][jahrKey]) verlaufDetails[name][jahrKey] = {};
      verlaufDetails[name][jahrKey][monatKey] = { ist: istVal, soll: sollVal, auszahlung: ausVal };

      await speichern();
      jahrFilterAktualisieren();
      
      document.getElementById("ergebnis").textContent = "✅ Cloud-Synchronisiert";
      setTimeout(() => { document.getElementById("ergebnis").textContent = ""; }, 2000);
      
      dropdownLaden();
      document.getElementById("mitarbeiterSelect").value = name;
      mitarbeiterWechseln();
      document.getElementById("ist").value = ""; 
      document.getElementById("auszahlung").value = "";
    }

    async function monatLoeschen(name, jahr, monat) {
      if (!confirm(`${monat}/${jahr} wirklich aus der Cloud löschen?`)) return;
      const details = verlaufDetails[name][jahr][monat];
      const diffMin = zeitZuMinuten(details.ist) - zeitZuMinuten(details.soll) - zeitZuMinuten(details.auszahlung || "00:00");
      mitarbeiter[name] -= diffMin;
      delete verlaufDetails[name][jahr][monat];
      
      await speichern();
      jahrFilterAktualisieren();
      mitarbeiterWechseln();
    }

    async function mitarbeiterLoeschen() {
      const name = document.getElementById("mitarbeiterSelect").value;
      if (confirm(`Soll "${name}" und alle seine Daten unwiderruflich aus der Cloud gelöscht werden?`)) {
        delete mitarbeiter[name]; delete sollStundenSpeicher[name]; 
        delete verlaufDetails[name]; delete startSalden[name];
        await speichern();
        location.reload();
      }
    }

    // Export & Backup
    function exportToExcel() {
      const jahr = document.getElementById("jahrFilter").value;
      let csv = "\ufeffMitarbeiter;Gesamtsaldo;";
      const monateNamen = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
      monateNamen.forEach(m => csv += `${m} (Ist);${m} (Diff);`);
      csv += "\r\n";
      Object.keys(mitarbeiter).sort().forEach(n => {
        let zeile = `${n};${minutenZuZeit(mitarbeiter[n])};`;
        for (let i = 1; i <= 12; i++) {
          const mKey = String(i).padStart(2, '0');
          const d = verlaufDetails[n]?.[jahr]?.[mKey];
          if (d) {
            zeile += `${d.ist};${minutenZuZeit(zeitZuMinuten(d.ist)-zeitZuMinuten(d.soll))};`;
          } else zeile += "-;-;";
        }
        csv += zeile + "\r\n";
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Porterhouse_Cloud_Export_${jahr}.csv`;
      link.click();
    }

    function exportBackup() {
      const data = { mitarbeiter, sollStundenSpeicher, verlaufDetails, startSalden };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Porterhouse_Cloud_Backup_${new Date().toLocaleDateString()}.json`;
      link.click();
    }

    async function importBackup(input) {
      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const data = JSON.parse(e.target.result);
          mitarbeiter = data.mitarbeiter || {};
          sollStundenSpeicher = data.sollStundenSpeicher || {};
          verlaufDetails = data.verlaufDetails || {};
          startSalden = data.startSalden || {};
          await speichern();
          alert("Backup erfolgreich in die Cloud übertragen!");
          location.reload();
        } catch (err) { alert("Import fehlgeschlagen!"); }
      };
      reader.readAsText(input.files[0]);
    }
  </script>
</body>
</html>
