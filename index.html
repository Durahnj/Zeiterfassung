<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Stunden-Pro | Porterhouse Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-font: 'Inter', sans-serif;
            --title-font: 'Playfair Display', serif;
            --bg-color: #f8f5f2;
            --card-bg: #ffffff;
            --accent: #8b5a3c;
            --text-main: #3d342d;
            --border-color: #e2d7cc;
            --danger: #c17373;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; min-height: 100vh; font-family: var(--primary-font); background: var(--bg-color); color: var(--text-main); }
        body { display: flex; justify-content: center; align-items: flex-start; padding: 15px; }
        .container { width: 100%; max-width: 1100px; background: var(--card-bg); border-radius: 30px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h1 { font-family: var(--title-font); text-align: center; margin: 0; color: var(--accent); font-size: 32px; }
        .subtitle { text-align: center; margin-bottom: 25px; color: #a67c52; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1001px) { .layout { grid-template-columns: 280px 1fr 320px; } }
        .card { background: #fff; border-radius: 24px; padding: 20px; border: 1px solid var(--border-color); }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 11px; text-transform: uppercase; color: #704a35; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: #fafafa; font-size: 16px; margin-bottom: 15px; font-family: var(--primary-font); }
        button { width: 100%; padding: 15px; border: none; border-radius: 14px; background: var(--accent); color: white; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: var(--primary-font); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .saldo-box { margin: 15px 0; background: #fdfaf7; border-radius: 16px; padding: 15px; text-align: center; border: 1px dashed var(--border-color); }
        .saldo-value { font-size: 24px; font-weight: 600; color: var(--accent); }
        .history-list { list-style: none; padding: 0; margin-top: 10px; max-height: 300px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-danger { background: #fdf2f2; color: var(--danger); font-size: 11px; padding: 8px; margin-top: 10px; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:1000; display:none; }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">Lade Cloud-Daten...</div>
    <div class="container">
        <h1>Stundenaufzeichnung</h1>
        <div class="subtitle">Porterhouse Cloud Sync</div>
        <div class="layout">
            <div class="card">
                <h3>Mitarbeiter</h3>
                <select id="mitarbeiterSelect"></select>
                <div id="newEmployeeArea" style="display:none;">
                    <label>Name</label><input type="text" id="newName">
                    <label>Start-Saldo</label><input type="text" id="startSaldo" placeholder="00:00">
                </div>
                <div class="saldo-box">
                    <label>Aktueller Saldo</label>
                    <div class="saldo-value" id="displaySaldo">00:00</div>
                </div>
                <button id="deleteEmpBtn" class="btn-danger" style="display:none;">Mitarbeiter löschen</button>
            </div>
            <div class="card">
                <h3>Neue Buchung</h3>
                <label>Zeitraum (MM/JJ)</label><input type="text" id="date" placeholder="05/26">
                <label>Soll-Stunden</label><input type="text" id="soll" placeholder="160:00">
                <label>Ist-Stunden</label><input type="text" id="ist" placeholder="168:00">
                <label>Auszahlung</label><input type="text" id="pay" placeholder="00:00">
                <button onclick="saveBooking()">Speichern & Synchronisieren</button>
                <p id="msg" style="text-align:center; font-size:12px; color:green;"></p>
            </div>
            <div class="card">
                <h3>Verlauf</h3>
                <select id="yearFilter"><option value="2026">2026</option><option value="2025">2025</option></select>
                <ul id="history" class="history-list"></ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyD2Q6LEBuofZl7lZNCx-pTLK1KdmW7butg",
  authDomain: "porterhouse-stunden.firebaseapp.com",
  databaseURL: "https://porterhouse-stunden-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "porterhouse-stunden",
  storageBucket: "porterhouse-stunden.firebasestorage.app",
  messagingSenderId: "381533675405",
  appId: "1:381533675405:web:ac97cfe492f8790dfae7c4"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let cloudData = {};

        // Hilfsfunktionen
        const t2m = (t) => { if(!t) return 0; let n=t.startsWith("-"); if(n) t=t.slice(1); let [h,m]=t.split(":").map(Number); let res=(h*60)+m; return n?-res:res; };
        const m2t = (m) => { let n=m<0; m=Math.abs(m); return (n?"-":"")+String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); };

        // Echtzeit-Überwachung
        onValue(ref(db, 'porterhouse'), (snap) => {
            cloudData = snap.val() || {};
            renderAll();
            document.getElementById("loader").style.display = "none";
        });

        function renderAll() {
            const sel = document.getElementById("mitarbeiterSelect");
            const cur = sel.value;
            sel.innerHTML = '<option value="neu">+ Neu</option>';
            const emps = cloudData.mitarbeiter || {};
            Object.keys(emps).sort().forEach(e => {
                let o = document.createElement("option"); o.value = e; o.textContent = e; sel.appendChild(o);
            });
            if(cur) sel.value = cur;
            updateUI();
        }

        function updateUI() {
            const name = document.getElementById("mitarbeiterSelect").value;
            const isN = name === "neu";
            document.getElementById("newEmployeeArea").style.display = isN ? "block" : "none";
            document.getElementById("deleteEmpBtn").style.display = isN ? "none" : "block";
            
            const saldo = isN ? 0 : (cloudData.mitarbeiter?.[name] || 0);
            document.getElementById("displaySaldo").textContent = m2t(saldo);
            
            // Verlauf
            const year = document.getElementById("yearFilter").value;
            const hist = document.getElementById("history");
            hist.innerHTML = "";
            const logs = cloudData.verlauf?.[name]?.[year] || {};
            Object.keys(logs).sort().forEach(m => {
                let li = document.createElement("li"); li.className="history-item";
                li.innerHTML = `<span>Monat ${m}</span> <span><b>${logs[m]}</b></span>`;
                hist.appendChild(li);
            });
        }

        window.saveBooking = async () => {
            const sel = document.getElementById("mitarbeiterSelect");
            const name = sel.value === "neu" ? document.getElementById("newName").value.trim() : sel.value;
            const date = document.getElementById("date").value;
            if(!name || !date.includes("/")) return alert("Name/Datum!");

            const [mm, jj] = date.split("/");
            const year = "20"+jj;
            const ist = document.getElementById("ist").value || "00:00";
            const soll = document.getElementById("soll").value || "00:00";
            const pay = document.getElementById("pay").value || "00:00";

            let oldS = sel.value === "neu" ? t2m(document.getElementById("startSaldo").value) : (cloudData.mitarbeiter[name] || 0);
            let diff = t2m(ist) - t2m(soll) - t2m(pay);

            const ups = {};
            ups[`porterhouse/mitarbeiter/${name}`] = oldS + diff;
            ups[`porterhouse/verlauf/${name}/${year}/${mm}`] = ist;
            
            await update(ref(db), ups);
            document.getElementById("msg").textContent = "Synchronisiert!";
            setTimeout(() => document.getElementById("msg").textContent="", 2000);
        };

        document.getElementById("mitarbeiterSelect").onchange = updateUI;
        document.getElementById("yearFilter").onchange = updateUI;
        document.getElementById("deleteEmpBtn").onclick = () => {
            const n = document.getElementById("mitarbeiterSelect").value;
            if(confirm(n + " löschen?")) remove(ref(db, `porterhouse/mitarbeiter/${n}`));
        };
    </script>
</body>
</html>
